<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:;base64,=" />
  <title>Streaming</title>
  <style>
    html,
    body {
      padding: 0;
      margin: 0;
      background-color: black;
    }

    video {
      width: 100%;
      height: 80vh;
      min-width: 100%;
      min-height: 100%;
      margin-top: 10px;
    }

    .cover {
      width: auto;
      height: 175px;
    }

    .flex-container {
      display: flex;
      flex-wrap: nowrap;
      justify-content: left;
      overflow-x: auto;
      -ms-overflow-style: -ms-autohiding-scrollbar;
      scrollbar-width: thin;
    }

    .flex-item {
      margin: 5px;
      margin-bottom: 0;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="flex-container">
    {{range .Dirs}}
    <div class="flex-item">
      <a href="/?path={{.}}">
        <img src="{{.}}/cover.jpg" alt="Cover" class="cover" />
      </a>
    </div>
    {{end}}
  </div>
  <video id="video" preload="metadata" poster="{{.Thumbnail}}" controls>
    {{range .Subtitles}}
    <track kind="subtitles" src="{{.Src}}" srclang="{{.Lang}}" label="{{.Label}}" {{if .IsDefault}}default{{end}} />
    {{end}}
  </video>
  <script src="js/hls.min.js"></script>
  <script>
    const video = document.getElementById("video");
    const hls = new Hls();
    hls.loadSource("{{.Path}}");
    hls.attachMedia(video);
  </script>
</body>

</html>
