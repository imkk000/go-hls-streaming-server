<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:;base64,=" />
  <title>Streaming</title>
  <style>
    html,
    body {
      padding: 0;
      margin: 0;
      background-color: black;
    }

    video {
      width: 100%;
      height: 80vh;
      min-width: 100%;
      min-height: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <video id="video" preload="metadata" controls>
    {{range .Subtitles}}
    <track kind="subtitles" src="{{.Src}}" srclang="{{.Lang}}" label="{{.Label}}" {{if .IsDefault}}default{{end}} />
    {{end}}
  </video>
  <script src="js/hls.min.js"></script>
  <script>
    const video = document.getElementById("video");
    const hls = new Hls();
    hls.loadSource("{{.Path}}");
    hls.attachMedia(video);
  </script>
</body>

</html>
